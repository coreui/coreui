<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chip input · a11y fixture</title>
    <link rel="stylesheet" href="/dist/css/coreui.min.css">
  </head>
  <body>
    <main class="container py-4">
      <h1>Chip input</h1>
      <div class="chip-input" data-coreui-chip-input data-coreui-name="skills" data-coreui-placeholder="Add a skill...">
        <label class="chip-input-label" for="skillsInput">Skills:</label>
        <span class="chip">JavaScript</span>
        <span class="chip">TypeScript</span>
        <span class="chip">Accessibility</span>
      </div>
    </main>
    <script src="/dist/js/coreui.bundle.min.js"></script>
  </body>
</html>
