<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Button · a11y fixture</title>
    <link rel="stylesheet" href="/dist/css/coreui.min.css">
  </head>
  <body>
    <main class="container py-4">
      <h1>Button</h1>
      <p class="d-flex flex-wrap gap-2">
        <button type="button" class="btn btn-primary">Primary</button>
        <button type="button" class="btn btn-secondary">Secondary</button>
        <button type="button" class="btn btn-primary" data-coreui-toggle="button" aria-pressed="false">Toggle</button>
        <button type="button" class="btn btn-primary" disabled>Disabled</button>
      </p>
    </main>
    <script src="/dist/js/coreui.bundle.min.js"></script>
  </body>
</html>
