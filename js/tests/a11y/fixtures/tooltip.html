<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tooltip · a11y fixture</title>
    <link rel="stylesheet" href="/dist/css/coreui.min.css">
  </head>
  <body>
    <main class="container py-5">
      <h1>Tooltip</h1>
      <button
        type="button"
        class="btn btn-secondary"
        data-coreui-toggle="tooltip"
        data-coreui-placement="top"
        data-coreui-title="Tooltip on top"
      >
        Tooltip on top
      </button>
    </main>
    <script src="/dist/js/coreui.bundle.min.js"></script>
    <script>
      for (const el of document.querySelectorAll('[data-coreui-toggle="tooltip"]')) {
        new coreui.Tooltip(el)
      }
    </script>
  </body>
</html>
